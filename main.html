<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電繡線上估價單</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        :root {
            --primary-color: #173064;
            --card-bg: #ffffff;
            --bg-color: #f4f6f8;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px 0;
        }
        
       .container {
            width: 94%;
            max-width: 1200px;
            margin: 0 auto;
        }
        @media (min-width: 1600px) {
            .container {
                width: 95%;
            }
        }

        .section-box {
            background: var(--card-bg);
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .section-header-text {
            font-size: 30px;
            display: block;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-color);
            padding-left: 15px;
        }

        .order-card {
            border: 1px solid #e0e0e0;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            background: #fff;
            position: relative;
            transition: box-shadow 0.3s;
        }

        .order-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .card-index {
            background: var(--primary-color);
            color: white;
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }

        .card-content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .preview-area {
            width: 100%;
        }

  .preview-tip {
    margin: 18px auto 0;
    max-width: 460px;

    font-family: "Noto Sans TC", "PingFang TC", sans-serif;
    font-size: 13px;
    font-weight: 400;

    color: #6e6e73;
    line-height: 1.8;
    letter-spacing: .03em;

    text-align: center;

    -webkit-font-smoothing: antialiased;
}

        .preview-tip span {
            display: inline;
        }

        @media (min-width: 1024px) {
            .preview-tip span {
                display: block;
            }
        }

        .preview-box {
            position: relative;
            width: 100%;
            aspect-ratio: 416.2778 / 437.4444;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-color: #f9f9f9;
            cursor: zoom-in;
        }
        
        .zoom-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.1s ease-out;
            transform-origin: center center;
            will-change: transform;
        }

        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
            transition: opacity 0.3s ease;
        }

        .default-preview-img {
            z-index: 1;
        }

        .dynamic-preview-img {
            z-index: 1;
            display: none;
            background-color: #fff;
        }

        .preview-text-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: max-content;
            max-width: none;
            white-space: nowrap;
            pointer-events: none;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .preview-text-layer.pos-left { top: 23%; left: 63%; }
        .preview-text-layer.pos-right { top: 23%; left: 35%; }
        .preview-text-layer.single-line-mode { top: 25%; }

        .p-text-line {
            display: block;
            line-height: 1.3;
            font-weight: bold;
            color: #d1b786;
            letter-spacing: 0.05em;
            text-align: center;
            white-space: nowrap;
        }

        .p-line1 { 
            font-size: 8px; 
            margin-bottom: 4px; 
        }
        
        .p-line2 { 
            font-size: 6px;
            transform-origin: center top;
        }

        .card-body-flat { flex-grow: 1; width: 100%; }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
        }
        
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
        }

        .span-2 { grid-column: 1 / -1; }
        .form-group { display: flex; flex-direction: column; }

        @media (min-width: 1024px) {
            .card-content-wrapper {
                flex-direction: row;
                align-items: flex-start;
            }
            .preview-area {
                flex-shrink: 0;
                width: 350px;
                margin-right: 20px;
            }
        }
        
        @media (min-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        label { font-size: 18px; font-weight: bold; margin-bottom: 6px; color: #173064; }

        input, select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
            height: 42px;
            background-color: #fff;
            transition: border-color 0.2s;
        }

        .instruction-image-wrapper { text-align: center; margin: 20px auto; }
        .instruction-image { width: 100%; height: auto; display: block; margin: 0 auto; }
        .desktop-only { max-width: 900px; }
        .mobile-only { max-width: 100%; }

        @media (max-width: 768px) {
            .desktop-only { display: none; }
        }

        @media (min-width: 769px) {
            .mobile-only { display: none; }
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .gray-text { color: #888 !important; }

        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .btn-blue { background: #173064; color: white; }
        .btn-green { background: #2e7d32; color: white; }
        .btn-red { background: #c62828; color: white; }
        .btn-gold { background: #d4b484; color: white; }
        .btn-gray { background: #6b7c93; color: white; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .bottom-actions {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
        }

        .action-btns-container {
            display: flex; gap: 14px; width: 100%; padding-left: 10px;
        }

        #final_price {
            width: 100%; color: black; font-size: 18px; line-height: 1.8; margin-bottom: 5px;
        }

        #copyButton {
            background-color: #d32f2f; color: white; font-size: 18px; padding: 15px 30px;
            border: 2px solid white; box-shadow: 0 4px 10px rgba(211, 47, 47, 0.3);
            animation: pulse-animation 2s infinite; margin-top: 15px;
        }
        
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }

        .font-kai { font-family: "KaiTi", "BiauKai", "DFKai-SB", "標楷體", serif; }
        .font-heavy { font-family: "Microsoft JhengHei", "Noto Serif TC", sans-serif; font-weight: 900; }
        .font-script { font-family: "Dancing Script", "Kunstler Script", cursive; font-style: italic; }

        .highlighted { 
            display: none; background: #e3f2fd; padding: 15px; border-radius: 8px; 
            margin-top: 15px; text-align: center; color: #0d47a1; font-weight: bold; font-size: 20px; 
        }
        
        .price { display: none; text-align: center; }
        
        #myConfirm { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 9999; 
        }
        .modal-content {
            background: #fff; padding: 30px; border-radius: 12px; text-align: center; 
            width: 90%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }
    </style>
</head>
<body>
<div class="container">
    <div class="instruction-image-wrapper">
        <img src="https://img.shoplineapp.com/media/image_clips/69843b90d68e93f4bb6ffc20/original.jpg?1770273680=&owner_id=6296d12d93deb3003127c0e8" alt="電繡流程說明（電腦版）" class="instruction-image desktop-only">
        <img src="https://img.shoplineapp.com/media/image_clips/698543a3a285bbab87c9193a/original.jpg?1770341282=&owner_id=6296d12d93deb3003127c0e8" alt="電繡流程說明（手機版）" class="instruction-image mobile-only">
    </div>
</div>

<div class="container">
    <!-- 修復點：將 form 移至 container 直屬層級，包裹所有區塊 -->
    <form id="orderForm">
        <div class="section-box" style="margin-top:25px;">
            <strong class="section-header-text">填寫需求及內容</strong>

            <div id="cardContainer">
                <div class="order-card card-item td2_row">
                    <div class="card-header">
                        <div class="card-index td2">1</div>
                    </div>

                    <div class="card-content-wrapper">
                        <div class="preview-area">
                            <div class="preview-box">
                                <div class="zoom-wrapper">
                                    <img src="https://img.shoplineapp.com/media/image_clips/6983f9efaa3fc852506c208d/original.jpg?1770256879=&owner_id=6296d12d93deb3003127c0e8" alt="電繡示意圖" class="preview-img default-preview-img">
                                    <img src="" alt="商品款式預覽" class="preview-img dynamic-preview-img">
                                    <div class="preview-text-layer">
                                        <span class="p-text-line p-line1"></span>
                                        <span class="p-text-line p-line2"></span>
                                    </div>
                                </div>
                            </div>
                            <div class="preview-tip"><span>示意圖僅供參考，實際電繡位置、尺寸及比例</span><span>將依衣款版型與實際製作為準。</span></div>
                        </div>

                        <div class="card-body-flat">
                            <div class="input-grid">
                                <div class="form-group">
                                    <label>商品貨號</label>
                                    <select class="s_product-code gray-text" name="product_code[]" required>
                                        <option value="" selected disabled hidden>請選擇</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>顏色</label>
                                    <select class="s_color gray-text" name="s_color[]" required><option value="">請選擇</option></select>
                                </div>
                                <div class="form-group">
                                    <label>袖長</label>
                                    <select class="s_sleeve gray-text" name="s_sleeve[]" required><option value="">請選擇</option></select>
                                </div>
                                <div class="form-group">
                                    <label>尺寸</label>
                                    <select class="s_size gray-text" name="s_size[]" required>
                                        <option value="" selected disabled hidden>請選擇</option>
                                        <option value="整批繡一樣">整批繡一樣</option>
                                        <option value="XS">XS</option>
                                        <option value="S">S</option>
                                        <option value="M">M</option>
                                        <option value="L">L</option>
                                        <option value="XL">XL</option>
                                        <option value="2XL">2XL</option>
                                        <option value="3XL">3XL</option>
                                        <option value="4XL">4XL</option>
                                        <option value="5XL">5XL</option>

                                </div>
                                <div class="form-group span-2">
                                    <label>件數</label>
                                    <input type="number" class="i_number" name="i_number[]" value="1" min="1" required>
                                </div>
                                <div class="form-group">
                                    <label>位置</label>
                                    <select class="s_position gray-text" name="s_position[]" required>

                                        <option value="left_chest">左胸口處</option>
                                        <option value="right_chest">右胸口處</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>繡線顏色</label>
                                    <select class="s_embroidery_color gray-text" name="s_embroidery_color[]" required>

                                </div>
                                <div class="form-group">

                                    <select class="s_font gray-text" name="s_font[]" required>
                                        <option value="" selected disabled hidden>請選擇</option>
                                        <option value="ch_kai">中文-標楷體</option>
                                        <option value="ch_heavy">中文-華康中黑體</option>
                                        <option value="en_kai">英文-標楷體</option>
                                        <option value="en_kunstler_script">英文-Kunstler Script</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>內容(第一行)</label> 
                                    <input class="embroidery1" name="i_embroidery1[]" placeholder="中文6字/英數20字內" required>
                                </div>
                                <div class="form-group">
                                    <label>字體(第二行)</label>
                                    <select class="s_font2 gray-text" name="s_font2[]">
                                        <option value="">請選擇</option>
                                        <option value="ch_kai">中文-標楷體</option>

                                </div>

                                    <label>內容(第二行)</label>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn-blue" id="btnAddRow">新增</button>
                <button type="button" class="btn-gray" id="btnCopyRow">複製</button>
                <button type="button" class="btn-gold" id="btnDelRow">刪除最後一行</button>
            </div>
        </div>

        <!-- 修復點：移除錯誤嵌套的 Container，將區塊平行排列 -->
        <div class="section-box">
            <strong class="section-header-text">聯絡方式</strong>
            <div class="contact-grid">
                <div class="form-group">
                    <label for="input_company">單位名稱</label>
                    <input id="input_company" name="user_company" required>
                </div>
                <div class="form-group">
                    <label for="input_name">聯絡人姓名</label>
                    <input id="input_name" name="user_name" required>
                </div>
                <div class="form-group">
                    <label for="input_phone">電話</label>
                    <input id="input_phone" name="user_phone" required>
                </div>
                <div class="form-group">
                    <label for="input_email">e-mail</label>
                    <input id="input_email" type="email" name="user_email" required>
                </div>
            </div>
        </div>

        <div class="section-box">
            <div class="bottom-actions" style="border-top: none; margin-top: 0; padding-top: 0;">
                <div id="final_price"></div>
                <div class="action-btns-container">
                    <button type="button" id="nosave" class="btn-blue">估價</button>
                    <button type="submit" id="save" class="btn-gold">估價並送單</button>
                </div>
            </div>
        </div>

        <!-- 必要的 Hidden Inputs -->
        <input type="hidden" name="table_content" id="table_content">
        <input type="hidden" name="user_serialnumber" id="user_serialnumber">
    </form>

    <div id="display_serialnumber" class="highlighted"></div>
    <div class="price">
        <button type="button" id="copyButton">按此複製電繡單單號</button>
    </div>
</div>

<div id="myConfirm">
    <div class="modal-content">
        <h3>確認送出</h3>
        <p>確定輸入都正確並準備開始估價存檔嗎?</p>
        <p style="color:#c62828; font-weight:bold; margin: 15px 0;">!! 請記得<span style="font-size:1.2em;">複製電繡單號</span>到訂單備註欄 !!</p>
        <div class="btn-group" style="justify-content: center;">
            <button id="okBtn" class="btn-blue">確定</button>
            <button id="cancelBtn" class="btn-gray">取消</button>
        </div>
    </div>
</div>

function fitLayerToContainer(card) {
    if (!card) return;
    const layer = card.querySelector('.preview-text-layer');
    const line1 = card.querySelector('.p-line1');
    const line2 = card.querySelector('.p-line2');
    
    if (!layer || !line1 || !line2) return;

    layer.style.transform = "translate(-50%, -50%) scale(1)";
    line2.style.transform = "scale(1)";
    
    requestAnimationFrame(() => {
        const line2Width = line2.scrollWidth;
        const maxLine2Width = 50;
        
        if (line2Width > maxLine2Width && line2.textContent.trim() !== "") {
            const scale2 = maxLine2Width / line2Width;
            line2.style.transform = `scale(${scale2})`;
        } else {
            line2.style.transform = "scale(1)";
        }

        const line1Width = line1.scrollWidth;
        const maxGlobalWidth = 180;
        
        let globalScale = 1;
        if (line1Width > maxGlobalWidth) {
            globalScale = maxGlobalWidth / line1Width;
        }
        
        layer.style.transform = `translate(-50%, -50%) scale(${globalScale})`;
    });
}

function initMagnifier(row) {
    const box = row.querySelector('.preview-box');
    const wrapper = row.querySelector('.zoom-wrapper');

    if (!box || !wrapper) return;

    box.addEventListener('mousemove', (e) => {
        const rect = box.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const xPercent = (x / rect.width) * 100;
        const yPercent = (y / rect.height) * 100;

        wrapper.style.transformOrigin = `${xPercent}% ${yPercent}%`;
        wrapper.style.transform = "scale(2.5)";
    });

    box.addEventListener('mouseleave', () => {
        wrapper.style.transform = "scale(1)";
        setTimeout(() => {
            if(wrapper.style.transform === "scale(1)") {
                wrapper.style.transformOrigin = "center center";
            }
        }, 100);
    });
}

function updateSelectColor(element) {
    if (!element.value) {
        element.classList.add("gray-text");
    } else {
        element.classList.remove("gray-text");
    }
}

function initProductOptions(row = document) {
    const sel = row.querySelector('.s_product-code');
    if (!sel) return;
    sel.innerHTML = '<option value="" selected disabled hidden>請選擇</option>';
    Object.keys(PRODUCT_DATA.COLORS).sort().forEach(code => {
        sel.add(new Option(code, code));
    });
}

function updateProductOptions(selectEl) {
    const code = selectEl.value;
    const card = selectEl.closest('.card-item');
    const colorSelect = card.querySelector('.s_color');
    const sleeveSelect = card.querySelector('.s_sleeve');

    colorSelect.innerHTML = '<option value="" selected disabled hidden>請選擇</option>';
    if (PRODUCT_DATA.COLORS[code]) {
        Object.entries(PRODUCT_DATA.COLORS[code]).forEach(([key, valObj]) => {
            colorSelect.add(new Option(valObj.name, key));
        });
    }

    sleeveSelect.innerHTML = '<option value="" selected disabled hidden>請選擇</option>';
    if (PRODUCT_DATA.SLEEVES[code]) {
        Object.entries(PRODUCT_DATA.SLEEVES[code]).forEach(([key, val]) => {
            sleeveSelect.add(new Option(val, key));
        });
    }
    
    updateSelectColor(colorSelect);
    updateSelectColor(sleeveSelect);

    updateProductImage(card);
}

function updateProductImage(row) {
    if (!row) return;

    const pCode = row.querySelector('.s_product-code').value;
    const cCode = row.querySelector('.s_color').value;
    
    const defaultImg = row.querySelector('.default-preview-img');
    const dynamicImg = row.querySelector('.dynamic-preview-img');

    let imgUrl = null;

    if (pCode && cCode && PRODUCT_DATA.COLORS[pCode] && PRODUCT_DATA.COLORS[pCode][cCode]) {
        imgUrl = PRODUCT_DATA.COLORS[pCode][cCode].img;
    }

    if (imgUrl && imgUrl.trim() !== "") {
        dynamicImg.src = imgUrl;
        dynamicImg.style.display = 'block';
        defaultImg.style.display = 'none';
    } else {
        dynamicImg.style.display = 'none';
        dynamicImg.src = "";
        defaultImg.style.display = 'block';
    }
}

function updatePreview(card) {
    if (!card) return;
    
    const posVal = card.querySelector('.s_position').value;
    const layer = card.querySelector('.preview-text-layer');
    layer.classList.remove('pos-left', 'pos-right');
    if (posVal === 'left_chest') layer.classList.add('pos-left');
    if (posVal === 'right_chest') layer.classList.add('pos-right');

    const colorVal = card.querySelector('.s_embroidery_color').value;
    const pLines = card.querySelectorAll('.p-text-line');
    
    const colorMap = {
        "700": "#BB1B1B", "535": "#D25012", "525": "#DA8B00", "233": "#3F941F",
        "367": "#132BCB", "335": "#131B64", "676": "#500898", "745": "#65351E",
        "900": "#000000", "800": "#FFFFFF", "485": "#A09FA4", "323": "#13A39A"
    };

    let color = '#d1b786';

    if (colorVal) {
        const prefix = colorVal.split('_')[0];
        if (colorMap.hasOwnProperty(prefix)) {
            color = colorMap[prefix];
        }
    }
    
    pLines.forEach(el => el.style.color = color);

    ['1', '2'].forEach(idx => {
        const fontVal = card.querySelector(`.s_font${idx === '1' ? '' : '2'}`).value;
        const textVal = card.querySelector(`.embroidery${idx}`).value;
        const previewEl = card.querySelector(`.p-line${idx}`);
        
        if (previewEl) {
            previewEl.textContent = textVal;
            previewEl.classList.remove('font-kai', 'font-heavy', 'font-script');
            if (fontVal.includes('kai')) previewEl.classList.add('font-kai');
            else if (fontVal.includes('heavy')) previewEl.classList.add('font-heavy');
            else if (fontVal.includes('script')) previewEl.classList.add('font-script');
        }
    });

    const txt2Val = card.querySelector('.embroidery2').value;
    if (!txt2Val || txt2Val.trim() === '') {
        layer.classList.add('single-line-mode');
    } else {
        layer.classList.remove('single-line-mode');
    }

    fitLayerToContainer(card);
}

let saveTimeout;
function saveToLocalStorage() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
        const data = {
            company: document.getElementById('input_company').value,
            name: document.getElementById('input_name').value,
            phone: document.getElementById('input_phone').value,
            email: document.getElementById('input_email').value,
            rows: []
        };
        
        document.querySelectorAll('.card-item').forEach(row => {
            data.rows.push({
                product_code: row.querySelector('.s_product-code').value,
                color: row.querySelector('.s_color').value,
                sleeve: row.querySelector('.s_sleeve').value,
                size: row.querySelector('.s_size').value,
                number: row.querySelector('.i_number').value,
                position: row.querySelector('.s_position').value,
                emb_color: row.querySelector('.s_embroidery_color').value,
                font1: row.querySelector('.s_font').value,
                txt1: row.querySelector('.embroidery1').value,
                font2: row.querySelector('.s_font2').value,
                txt2: row.querySelector('.embroidery2').value
            });
        });
        
        localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(data));
    }, 300);
}

function loadFromLocalStorage() {
    const saved = localStorage.getItem(CONFIG.STORAGE_KEY);
    if (!saved) return;
    
    try {
        const data = JSON.parse(saved);
        if(data.company) document.getElementById('input_company').value = data.company;
        if(data.name) document.getElementById('input_name').value = data.name;
        if(data.phone) document.getElementById('input_phone').value = data.phone;
        if(data.email) document.getElementById('input_email').value = data.email;

        if (data.rows && data.rows.length > 0) {
            const container = document.getElementById('cardContainer');
            while (container.querySelectorAll('.card-item').length < data.rows.length) {
                addRow();
            }
            
            const rows = container.querySelectorAll('.card-item');
            data.rows.forEach((rowData, index) => {
                if (index >= rows.length) return;
                const row = rows[index];
                const setVal = (sel, val) => { 
                    const el = row.querySelector(sel); 
                    if(el) el.value = val || ''; 
                };

                setVal('.s_product-code', rowData.product_code);
                updateProductOptions(row.querySelector('.s_product-code'));
                
                setVal('.s_color', rowData.color);
                setVal('.s_sleeve', rowData.sleeve);
                setVal('.s_size', rowData.size);
                setVal('.i_number', rowData.number || "1");
                setVal('.s_position', rowData.position);
                setVal('.s_embroidery_color', rowData.emb_color);
                setVal('.s_font', rowData.font1);
                setVal('.embroidery1', rowData.txt1);
                setVal('.s_font2', rowData.font2);
                setVal('.embroidery2', rowData.txt2);

                row.querySelectorAll('select').forEach(updateSelectColor);
                updatePreview(row);
                updateProductImage(row);
            });
        }
    } catch (e) {
        console.error("Auto-fill error:", e);
    }
}

        alert("系統載入異常，請重新整理頁面或稍後再試。");
    }
    
    initProductOptions();
    
    document.querySelectorAll('.card-item').forEach(initMagnifier);

    document.getElementById('btnAddRow').addEventListener('click', () => { addRow(); saveToLocalStorage(); });
    document.getElementById('btnCopyRow').addEventListener('click', () => { copyLastRow(); saveToLocalStorage(); });
    document.getElementById('btnDelRow').addEventListener('click', () => { delLastRow(); saveToLocalStorage(); });
    document.getElementById('nosave').addEventListener('click', () => performCalculation(true));
    document.getElementById('copyButton').addEventListener('click', copySerial);
    
    const modal = document.getElementById("myConfirm");
    const confirmBtn = document.getElementById("okBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    cancelBtn.addEventListener('click', () => {
        modal.style.display = "none";
    });

    confirmBtn.addEventListener('click', () => {
        executeSubmit();
    });

    const form = document.getElementById('orderForm');
    form.addEventListener('input', (e) => {
        if(e.target.matches('input, select')) saveToLocalStorage();
        if(e.target.matches('.embroidery1, .embroidery2')) updatePreview(e.target.closest('.card-item'));
    });
    
    form.addEventListener('change', (e) => {
        const row = e.target.closest('.card-item');
        if (e.target.tagName === 'SELECT') updateSelectColor(e.target);
        
        if (e.target.classList.contains('s_product-code')) {
            updateProductOptions(e.target);
        }
        
        if (e.target.classList.contains('s_color')) {
            updateProductImage(row);
        }

        if (e.target.matches('.s_position, .s_font, .s_font2, .s_embroidery_color')) updatePreview(row);
        saveToLocalStorage();
    });

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!performCalculation(true)) return;
        modal.style.display = "flex";
    });

    document.querySelectorAll('select').forEach(updateSelectColor);
    loadFromLocalStorage();
});

function addRow() {
    const container = document.getElementById('cardContainer');
    const template = container.querySelector('.td2_row');
    const newRow = template.cloneNode(true);
    
    initProductOptions(newRow);

    newRow.querySelectorAll('input').forEach(input => input.value = input.type === 'number' ? '1' : '');
    newRow.querySelectorAll('select').forEach(select => {
        select.value = "";
        if (select.matches('.s_color, .s_sleeve')) select.innerHTML = '<option value="">請選擇</option>';
        updateSelectColor(select);
    });
    
    const textLayer = newRow.querySelector('.preview-text-layer');
    textLayer.className = 'preview-text-layer';
    textLayer.classList.add('single-line-mode');
    textLayer.style.transform = 'translate(-50%, -50%) scale(1)';
    
    newRow.querySelectorAll('.p-text-line').forEach(el => {
        el.textContent = '';
        el.style.color = '#d1b786';
        el.className = el.classList.contains('p-line1') ? 'p-text-line p-line1' : 'p-text-line p-line2';
        el.style.transform = 'scale(1)';
    });

    const defaultImg = newRow.querySelector('.default-preview-img');
    const dynamicImg = newRow.querySelector('.dynamic-preview-img');
    dynamicImg.src = "";
    dynamicImg.style.display = "none";
    defaultImg.style.display = "block";
    
    initMagnifier(newRow);

    container.appendChild(newRow);
    reIndex();
}

function copyLastRow() {
    const container = document.getElementById('cardContainer');
    const rows = container.querySelectorAll('.td2_row');
    const lastRow = rows[rows.length - 1];
    const newRow = lastRow.cloneNode(true);
    
    const origSelects = lastRow.querySelectorAll('select');
    newRow.querySelectorAll('select').forEach((sel, idx) => {
        sel.value = origSelects[idx].value;
        updateSelectColor(sel);
    });
    
    const origInputs = lastRow.querySelectorAll('input');
    newRow.querySelectorAll('input').forEach((inp, idx) => inp.value = origInputs[idx].value);

    updatePreview(newRow);
    updateProductImage(newRow);
    
    initMagnifier(newRow);

    container.appendChild(newRow);
    reIndex();
}

function delLastRow() {
    const rows = document.querySelectorAll('.td2_row');
    if (rows.length > 1) {
        rows[rows.length - 1].remove();
        reIndex();
    }
}

function reIndex() {
    const rows = document.querySelectorAll('.td2_row');
    rows.forEach((row, index) => {
        const indexDiv = row.querySelector('.card-index');
        if (indexDiv) {
            indexDiv.textContent = index + 1;
        }
    });
}

function performCalculation(showErrors = true) {
    let currentTotal = 0, chNum = 0, enNum = 0, chPrice = 0, enPrice = 0;
    let errors = [];
    let focusEl = null;

    ['input_company', 'input_name', 'input_phone', 'input_email'].forEach(id => {
        const el = document.getElementById(id);
        if (!el.value.trim()) {
            errors.push(`${el.previousElementSibling.textContent} 未填寫`);
            if (!focusEl) focusEl = el;
        }
    });

    document.querySelectorAll('.td2_row').forEach((row, idx) => {
        const rowNum = idx + 1;
        const getVal = (cls) => row.querySelector(cls)?.value || "";
        
        if (!getVal('.s_product-code')) errors.push(`第 ${rowNum} 項：商品貨號未選擇`);
        if (!getVal('.s_color')) errors.push(`第 ${rowNum} 項：顏色未選擇`);
        if (!getVal('.s_sleeve')) errors.push(`第 ${rowNum} 項：袖長未選擇`);
        if (!getVal('.s_size')) errors.push(`第 ${rowNum} 項：尺寸未選擇`);
        if (parseInt(getVal('.i_number')) <= 0) errors.push(`第 ${rowNum} 項：件數必須大於 0`);
        if (!getVal('.s_position')) errors.push(`第 ${rowNum} 項：位置未選擇`);
        if (!getVal('.s_embroidery_color')) errors.push(`第 ${rowNum} 項：繡線顏色未選擇`);
        if (!getVal('.s_font')) errors.push(`第 ${rowNum} 項：字體(一)未選擇`);
        
        const txt1 = getVal('.embroidery1');
        const txt2 = getVal('.embroidery2');
        const font2 = getVal('.s_font2');
        
        const isTooLong = (t) => t && (/[\u4E00-\u9FA5]/.test(t) ? t.length > 6 : t.length > 20);

        if (!txt1) {
            errors.push(`第 ${rowNum} 項：內容(一)為必填`);
        } else if (isTooLong(txt1)) {
            errors.push(`第 ${rowNum} 項內容(一)過長(中6/英20)`);
        }

        if (font2) {
            if (!txt2) {
                errors.push(`第 ${rowNum} 項的內容(第二行)內容為空白`);
            } else {
                if (isTooLong(txt2)) {
                    errors.push(`第 ${rowNum} 項內容(二)過長(中6/英20)`);
                }
            }
        } else {
            if (txt2) {
                errors.push(`第 ${rowNum} 項：有填寫內容(二)則必須選擇字體`);
            }
        }

        [txt1, txt2].forEach(txt => {
            let cCh = 0, cEn = 0;
            if (txt) {
                for (const char of txt) {
                    if (/[\u4E00-\u9FA5]/.test(char)) cCh++;
                    else if (char !== ' ' && char !== '　') cEn++;
                }
            }
            const num = parseInt(getVal('.i_number')) || 0;
            chNum += cCh * num; enNum += cEn * num;
            chPrice += cCh * CONFIG.PRICE_CH * num;
            enPrice += cEn * CONFIG.PRICE_EN * num;
        });
    });

    if (showErrors && errors.length > 0) {
        alert(errors.join('\n'));
        if (focusEl) focusEl.focus();
        return false;
    }

    totalPrice = chPrice + enPrice;
    if (showErrors) {
        document.getElementById('final_price').innerHTML = 
            `中文共 ${chNum} 字 ($${chPrice})，英數符號共 ${enNum} 字 ($${enPrice})<br>` +
            `總價 <b style='color:#c62828;'>$${totalPrice}</b>，請下單 <span style='color:#c62828;'>${Math.ceil(totalPrice/15)}</span> 個單位`;
    }
    return true;
}

function generateEmailTableHTML() {
    const escape = (str) => (str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const getTxt = (row, cls) => {
        const sel = row.querySelector(cls);
        return sel && sel.selectedIndex >= 0 ? escape(sel.options[sel.selectedIndex].text) : "";
    };

    let html = `<table style="width:100%; border-collapse:collapse; border:1px solid #ccc; font-size:13px;"><thead><tr style="background:#173064; color:#fff;">`;
    ['項次','貨號','顏色','袖長','尺寸','件數','位置','繡線','字體1','內容1','字體2','內容2'].forEach(h => html += `<th style="padding:8px; border:1px solid #ccc;">${h}</th>`);
    html += `</tr></thead><tbody>`;

    let totalQty = 0;
    document.querySelectorAll('.td2_row').forEach((row, idx) => {
        const qty = parseInt(row.querySelector('.i_number').value) || 0;
        totalQty += qty;
        html += `<tr style="background:${idx%2===0 ? '#f9f9f9':'#fff'}">`;
        html += `<td style="padding:8px; border:1px solid #ccc; text-align:center;">${idx+1}</td>`;
        html += `<td style="padding:8px; border:1px solid #ccc;">${getTxt(row, '.s_product-code')}</td>`;
        html += `<td style="padding:8px; border:1px solid #ccc;">${getTxt(row, '.s_color')}</td>`;
        html += `<td style="padding:8px; border:1px solid #ccc;">${getTxt(row, '.s_sleeve')}</td>`;
        html += `<td style="padding:8px; border:1px solid #ccc;">${getTxt(row, '.s_size')}</td>`;
        html += `<td style="padding:8px; border:1px solid #ccc; font-weight:bold; text-align:center;">${qty}</td>`;
        html += `<td style="padding:8px; border:1px solid #ccc;">${getTxt(row, '.s_position')}</td>`;
        html += `<td style="padding:8px; border:1px solid #ccc;">${getTxt(row, '.s_embroidery_color')}</td>`;
        html += `<td style="padding:8px; border:1px solid #ccc;">${getTxt(row, '.s_font')}</td>`;
        html += `<td style="padding:8px; border:1px solid #ccc; color:#c62828;">${escape(row.querySelector('.embroidery1').value)}</td>`;
        html += `<td style="padding:8px; border:1px solid #ccc;">${getTxt(row, '.s_font2')}</td>`;
        html += `<td style="padding:8px; border:1px solid #ccc; color:#c62828;">${escape(row.querySelector('.embroidery2').value)}</td>`;
        html += `</tr>`;
    });
    html += `</tbody></table>`;
    html += `<div style="margin-top:20px; padding:15px; background:#eee;"><p>總件數: ${totalQty}</p><p>總金額: <b style="color:#c62828; font-size:18px;">$${totalPrice}</b></p></div>`;
    return html;
}

function executeSubmit() {
    const modal = document.getElementById("myConfirm");
    modal.style.display = "none";
    const btn = document.getElementById("save");
    btn.disabled = true;
    btn.textContent = "傳送中...";

    const serial = "AL" + new Date().toISOString().replace(/[-:T.]/g, "").slice(2, 12) + Math.random().toString(36).substr(2, 3).toUpperCase();
    
    document.getElementById("user_serialnumber" ).value = serial;
    document.getElementById("table_content").value = generateEmailTableHTML();

    emailjs.sendForm(CONFIG.SERVICE_ID, CONFIG.TEMPLATE_ID, "#orderForm")
        .then(() => {
            localStorage.removeItem(CONFIG.STORAGE_KEY);
            alert('✅ 已成功送出！');
            const disp = document.getElementById("display_serialnumber");
            disp.innerHTML = `您的電繡單單號是: <b>${serial}</b>`;
            disp.style.display = "block";
            document.querySelector(".price").style.display = "block";
            document.getElementById("copyButton").setAttribute("data-serial", serial);
            btn.textContent = "已送出";
            setTimeout(() => { btn.disabled = false; btn.textContent = "估價並送單"; }, 5000);
        })
        .catch(err => {
            console.error(err);
            alert('❌ 發送失敗，請檢查網路連線或稍後再試。');
            btn.disabled = false;
            btn.textContent = "估價並送單";
        });
}

function copySerial() {
    const serial = this.getAttribute("data-serial");
    if (!serial) return;
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(serial).then(() => alert("✅ 已複製單號")).catch(() => promptCopy(serial));
    } else {
        promptCopy(serial);
    }
}

function promptCopy(text) {
    prompt("請手動複製單號:", text);
}
</script>
